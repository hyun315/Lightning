<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>⚡ 번개때리기</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --black: #0a0a0f;
    --dark: #10101a;
    --panel: #16162a;
    --yellow: #ffe600;
    --yellow-glow: #ffcc00;
    --blue-bolt: #4fc3f7;
    --danger: #ff4444;
    --text: #e8e8f0;
    --muted: #888899;
  }

  html, body {
    height: 100%;
    background: var(--black);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    overflow: hidden;
  }

  /* ── SCREEN MANAGER ── */
  .screen {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 24px;
    transition: opacity 0.3s;
  }
  .screen.hidden { opacity: 0; pointer-events: none; }

  /* ── BACKGROUND GRID ── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(255,230,0,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,230,0,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    z-index: 0;
    pointer-events: none;
  }

  /* ── LIGHTNING CANVAS ── */
  #lightning-canvas {
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 10;
  }

  /* ── STRIKER SCREEN ── */
  .brand {
    font-family: 'Black Han Sans', sans-serif;
    font-size: 2.2rem;
    letter-spacing: -1px;
    color: var(--yellow);
    text-shadow: 0 0 20px rgba(255,230,0,0.6);
    margin-bottom: 4px;
    z-index: 1;
  }
  .brand span { color: var(--blue-bolt); }

  .tagline {
    font-size: 0.85rem;
    color: var(--muted);
    margin-bottom: 40px;
    z-index: 1;
  }

  /* ── MAIN BOLT BUTTON ── */
  .bolt-btn {
    position: relative;
    width: 200px; height: 200px;
    border-radius: 50%;
    border: none;
    background: radial-gradient(circle at 40% 35%, #fff9c4, var(--yellow) 40%, #cc9900);
    cursor: pointer;
    outline: none;
    z-index: 1;
    box-shadow:
      0 0 0 12px rgba(255,230,0,0.08),
      0 0 40px rgba(255,230,0,0.3),
      0 0 80px rgba(255,230,0,0.15);
    transition: transform 0.1s, box-shadow 0.2s;
    animation: pulse-ring 2.5s ease-in-out infinite;
  }
  .bolt-btn:active {
    transform: scale(0.93);
    box-shadow: 0 0 0 20px rgba(255,230,0,0.15), 0 0 60px rgba(255,230,0,0.5);
  }
  .bolt-btn .bolt-icon {
    font-size: 90px;
    line-height: 1;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.4));
    user-select: none;
  }

  @keyframes pulse-ring {
    0%, 100% { box-shadow: 0 0 0 12px rgba(255,230,0,0.08), 0 0 40px rgba(255,230,0,0.3), 0 0 80px rgba(255,230,0,0.1); }
    50%       { box-shadow: 0 0 0 20px rgba(255,230,0,0.12), 0 0 60px rgba(255,230,0,0.5), 0 0 120px rgba(255,230,0,0.2); }
  }

  .bolt-label {
    margin-top: 28px;
    font-family: 'Black Han Sans', sans-serif;
    font-size: 1.1rem;
    color: var(--muted);
    z-index: 1;
    letter-spacing: 1px;
  }

  /* ── SHARE PANEL ── */
  .share-panel {
    background: var(--panel);
    border: 1px solid rgba(255,230,0,0.2);
    border-radius: 16px;
    padding: 24px;
    width: 100%; max-width: 360px;
    z-index: 1;
    margin-top: 32px;
  }
  .share-panel h3 {
    font-family: 'Black Han Sans', sans-serif;
    font-size: 1rem;
    color: var(--yellow);
    margin-bottom: 12px;
  }
  .url-box {
    background: var(--black);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 0.72rem;
    color: var(--muted);
    word-break: break-all;
    margin-bottom: 12px;
    line-height: 1.5;
  }
  .btn-row {
    display: flex; gap: 8px;
  }
  .share-btn {
    flex: 1;
    padding: 12px;
    border: none; border-radius: 10px;
    font-family: 'Black Han Sans', sans-serif;
    font-size: 0.95rem;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
  }
  .share-btn:active { transform: scale(0.96); opacity: 0.85; }
  .share-btn.kakao { background: #FEE500; color: #3A1D1D; }
  .share-btn.copy  { background: var(--panel); color: var(--text); border: 1px solid rgba(255,255,255,0.15); }

  .waiting-chip {
    display: inline-flex; align-items: center; gap: 6px;
    margin-top: 14px;
    padding: 6px 14px;
    background: rgba(255,230,0,0.08);
    border: 1px solid rgba(255,230,0,0.2);
    border-radius: 999px;
    font-size: 0.8rem; color: var(--yellow);
  }
  .dot-pulse { width: 7px; height: 7px; border-radius: 50%; background: var(--yellow); animation: dot-blink 1s infinite; }
  @keyframes dot-blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

  /* ── RECEIVER SCREEN ── */
  #screen-receiver .recv-title {
    font-family: 'Black Han Sans', sans-serif;
    font-size: 1.6rem;
    color: var(--yellow);
    text-shadow: 0 0 16px rgba(255,230,0,0.5);
    text-align: center;
    margin-bottom: 8px;
    z-index: 1;
  }
  #screen-receiver .recv-sub {
    font-size: 0.85rem; color: var(--muted);
    text-align: center; margin-bottom: 40px; z-index: 1;
  }
  .choice-btns {
    display: flex; flex-direction: column; gap: 16px;
    width: 100%; max-width: 300px;
    z-index: 1;
  }
  .choice-btn {
    padding: 20px;
    border: none; border-radius: 16px;
    font-family: 'Black Han Sans', sans-serif;
    font-size: 1.4rem;
    cursor: pointer;
    transition: transform 0.1s;
    display: flex; align-items: center; justify-content: center; gap: 10px;
  }
  .choice-btn:active { transform: scale(0.95); }
  .choice-btn.yes {
    background: linear-gradient(135deg, #ffe600, #ffaa00);
    color: #1a1000;
    box-shadow: 0 4px 24px rgba(255,200,0,0.35);
  }
  .choice-btn.no {
    background: var(--panel);
    color: var(--text);
    border: 1px solid rgba(255,255,255,0.12);
  }

  /* ── RESULT SCREEN ── */
  #screen-result .result-emoji {
    font-size: 100px;
    margin-bottom: 16px;
    z-index: 1;
    animation: pop-in 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
  }
  @keyframes pop-in {
    from { transform: scale(0.2); opacity: 0; }
    to   { transform: scale(1);   opacity: 1; }
  }
  #screen-result .result-title {
    font-family: 'Black Han Sans', sans-serif;
    font-size: 1.8rem;
    text-align: center;
    z-index: 1;
    margin-bottom: 8px;
  }
  #screen-result .result-sub {
    font-size: 0.9rem; color: var(--muted);
    text-align: center; z-index: 1;
    margin-bottom: 32px;
  }
  .reset-btn {
    padding: 14px 36px;
    border: none; border-radius: 12px;
    background: var(--yellow); color: #1a1000;
    font-family: 'Black Han Sans', sans-serif;
    font-size: 1rem;
    cursor: pointer;
    z-index: 1;
    transition: transform 0.1s;
  }
  .reset-btn:active { transform: scale(0.95); }

  /* ── FIREBASE CONFIG MODAL ── */
  #config-modal {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.9);
    display: flex; align-items: center; justify-content: center;
    padding: 24px; z-index: 100;
  }
  #config-modal.hidden { display: none; }
  .config-box {
    background: var(--panel);
    border: 1px solid rgba(255,230,0,0.3);
    border-radius: 16px;
    padding: 28px;
    width: 100%; max-width: 400px;
  }
  .config-box h2 {
    font-family: 'Black Han Sans', sans-serif;
    color: var(--yellow); margin-bottom: 6px;
  }
  .config-box p { font-size: 0.8rem; color: var(--muted); margin-bottom: 20px; line-height: 1.5; }
  .config-box input {
    width: 100%; padding: 10px 12px;
    background: var(--black); border: 1px solid rgba(255,255,255,0.15);
    border-radius: 8px; color: var(--text); font-size: 0.8rem;
    margin-bottom: 10px; outline: none;
  }
  .config-box input:focus { border-color: var(--yellow); }
  .config-box input::placeholder { color: var(--muted); }
  .config-save {
    width: 100%; padding: 13px;
    background: var(--yellow); color: #1a1000;
    border: none; border-radius: 10px;
    font-family: 'Black Han Sans', sans-serif;
    font-size: 1rem; cursor: pointer; margin-top: 6px;
  }
  .config-note {
    font-size: 0.72rem; color: var(--muted);
    margin-top: 12px; text-align: center; line-height: 1.5;
  }
  .config-note a { color: var(--blue-bolt); }

  /* ── DEMO MODE BADGE ── */
  .demo-badge {
    position: fixed; top: 16px; right: 16px;
    background: rgba(79,195,247,0.15);
    border: 1px solid rgba(79,195,247,0.3);
    color: var(--blue-bolt);
    font-size: 0.7rem; padding: 4px 10px; border-radius: 999px;
    z-index: 50;
  }
</style>
</head>
<body>

<canvas id="lightning-canvas"></canvas>

<!-- ── FIREBASE CONFIG MODAL ── -->
<div id="config-modal">
  <div class="config-box">
    <h2>⚡ Firebase 설정</h2>
    <p>실시간 연동을 위해 Firebase 프로젝트 정보가 필요합니다.<br>
    없으면 <b>데모 모드</b>로 바로 체험할 수 있어요.</p>
    <input id="cfg-apiKey"    placeholder="apiKey" />
    <input id="cfg-projectId" placeholder="projectId" />
    <input id="cfg-dbUrl"     placeholder="databaseURL (https://xxx.firebaseio.com)" />
    <button class="config-save" onclick="saveConfig()">저장하고 시작</button>
    <button class="config-save" style="background:var(--panel);color:var(--text);border:1px solid rgba(255,255,255,0.15);margin-top:8px;" onclick="demoMode()">데모 모드로 체험</button>
    <p class="config-note">
      <a href="https://console.firebase.google.com" target="_blank">Firebase Console</a>에서 무료 프로젝트 생성 후<br>
      Realtime Database 활성화 → 규칙을 read/write: true로 설정
    </p>
  </div>
</div>

<!-- ── STRIKER SCREEN ── -->
<div id="screen-striker" class="screen hidden">
  <div class="brand">⚡ 번개<span>때리기</span></div>
  <div class="tagline">갑작스러운 만남 제안</div>

  <button class="bolt-btn" id="strike-btn" onclick="doStrike()">
    <span class="bolt-icon">⚡</span>
  </button>
  <div class="bolt-label">눌러서 번개 때리기</div>

  <div id="share-panel" class="share-panel hidden" style="margin-top:28px;">
    <h3>📤 상대방에게 전달</h3>
    <div class="url-box" id="share-url-display">—</div>
    <div class="btn-row">
      <button class="share-btn kakao" onclick="shareKakao()">카카오톡</button>
      <button class="share-btn copy"  onclick="copyUrl()">링크 복사</button>
    </div>
    <div style="text-align:center;">
      <span class="waiting-chip"><span class="dot-pulse"></span> 상대방 응답 대기 중…</span>
    </div>
  </div>
</div>

<!-- ── RECEIVER SCREEN ── -->
<div id="screen-receiver" class="screen hidden">
  <div class="recv-title">⚡ 번개 맞기</div>
  <div class="recv-sub" id="recv-sub">누군가 당신에게 번개를 날렸어요!</div>
  <div class="choice-btns">
    <button class="choice-btn yes" onclick="respond(true)">⚡ 맞기 (만나자!)</button>
    <button class="choice-btn no"  onclick="respond(false)">🛡 피하기 (못 만나)</button>
  </div>
</div>

<!-- ── RESULT SCREEN ── -->
<div id="screen-result" class="screen hidden">
  <div class="result-emoji" id="result-emoji">⚡</div>
  <div class="result-title" id="result-title">콰쾅!</div>
  <div class="result-sub"   id="result-sub">번개가 터졌다!</div>
  <button class="reset-btn" onclick="resetApp()">다시 때리기</button>
</div>

<script>
/* ─────────────────────────────────────────────
   GLOBALS
───────────────────────────────────────────── */
let db = null;
let sessionId = null;
let isDemo = false;
let isReceiver = false;
let demoListeners = [];

/* ─────────────────────────────────────────────
   INIT
───────────────────────────────────────────── */
window.addEventListener('DOMContentLoaded', () => {
  const params = new URLSearchParams(location.search);
  sessionId = params.get('s');

  if (sessionId) {
    // 수신자 모드: URL로 접근
    isReceiver = true;
    const saved = localStorage.getItem('bbungae_cfg');
    if (saved) {
      try { initFirebase(JSON.parse(saved)); } catch(e) { demoReceiver(); }
    } else { demoReceiver(); }
  } else {
    // 발신자 모드
    const saved = localStorage.getItem('bbungae_cfg');
    if (saved) {
      try {
        initFirebase(JSON.parse(saved));
        hide('config-modal');
        show('screen-striker');
      } catch(e) { /* show config */ }
    }
    // else: config modal 표시됨
  }
});

/* ─────────────────────────────────────────────
   FIREBASE INIT
───────────────────────────────────────────── */
function initFirebase(cfg) {
  if (firebase.apps.length === 0) {
    firebase.initializeApp({
      apiKey: cfg.apiKey,
      projectId: cfg.projectId,
      databaseURL: cfg.databaseURL,
    });
  }
  db = firebase.database();
}

function saveConfig() {
  const apiKey    = document.getElementById('cfg-apiKey').value.trim();
  const projectId = document.getElementById('cfg-projectId').value.trim();
  const databaseURL = document.getElementById('cfg-dbUrl').value.trim();
  if (!apiKey || !projectId || !databaseURL) {
    alert('세 항목을 모두 입력해 주세요.');
    return;
  }
  const cfg = { apiKey, projectId, databaseURL };
  localStorage.setItem('bbungae_cfg', JSON.stringify(cfg));
  try {
    initFirebase(cfg);
    hide('config-modal');
    if (isReceiver) { showReceiverScreen(); }
    else { show('screen-striker'); }
  } catch(e) {
    alert('Firebase 연결 실패: ' + e.message);
  }
}

/* ─────────────────────────────────────────────
   DEMO MODE
───────────────────────────────────────────── */
function demoMode() {
  isDemo = true;
  hide('config-modal');
  document.body.insertAdjacentHTML('beforeend',
    '<div class="demo-badge">데모 모드</div>');
  if (isReceiver) { demoReceiver(); }
  else { show('screen-striker'); }
}

function demoReceiver() {
  isDemo = true;
  isReceiver = true;
  document.body.insertAdjacentHTML('beforeend',
    '<div class="demo-badge">데모 모드</div>');
  hide('config-modal');
  showReceiverScreen();
}

/* ─────────────────────────────────────────────
   STRIKER: 번개 때리기
───────────────────────────────────────────── */
async function doStrike() {
  // 버튼 애니메이션
  const btn = document.getElementById('strike-btn');
  btn.style.transform = 'scale(0.88)';
  setTimeout(() => btn.style.transform = '', 200);

  flashLightning(3);

  // 세션 ID 생성
  sessionId = Date.now().toString(36) + Math.random().toString(36).slice(2, 7);

  const shareUrl = `${location.origin}${location.pathname}?s=${sessionId}`;
  document.getElementById('share-url-display').textContent = shareUrl;

  if (!isDemo && db) {
    await db.ref(`sessions/${sessionId}`).set({ state: 'waiting', ts: Date.now() });
    // 응답 리스닝
    db.ref(`sessions/${sessionId}/state`).on('value', snap => {
      const state = snap.val();
      if (state === 'accepted') showResult(true);
      else if (state === 'rejected') showResult(false);
    });
  } else {
    // 데모: 5초 후 랜덤 응답 시뮬레이션
    setTimeout(() => {
      const r = Math.random() > 0.45;
      showResult(r);
    }, 5000);
  }

  document.getElementById('share-panel').classList.remove('hidden');
}

function shareKakao() {
  const url = document.getElementById('share-url-display').textContent;
  const kakaoUrl = `kakaolink://send?text=${encodeURIComponent('⚡ 번개 맞을 준비 됐어?\n' + url)}`;
  // 카카오톡 앱 딥링크 시도, 실패 시 복사
  const a = document.createElement('a');
  a.href = kakaoUrl;
  try {
    window.location.href = kakaoUrl;
  } catch(e) { copyUrl(); }
  // 2초 후에도 안 넘어갔으면 복사 안내
  setTimeout(() => {
    if (document.hidden === false) {
      const ok = confirm('카카오톡으로 전환이 안 됐어요.\n링크를 클립보드에 복사할까요?');
      if (ok) copyUrl();
    }
  }, 2000);
}

function copyUrl() {
  const url = document.getElementById('share-url-display').textContent;
  navigator.clipboard.writeText(url).then(() => {
    alert('링크 복사 완료! 카톡에 붙여넣기 하세요 ✅');
  }).catch(() => {
    prompt('아래 링크를 복사하세요:', url);
  });
}

/* ─────────────────────────────────────────────
   RECEIVER: 번개 맞기/피하기
───────────────────────────────────────────── */
function showReceiverScreen() {
  hide('config-modal');
  show('screen-receiver');
}

async function respond(accepted) {
  flashLightning(accepted ? 6 : 1);
  hide('screen-receiver');

  if (!isDemo && db && sessionId) {
    await db.ref(`sessions/${sessionId}/state`).set(accepted ? 'accepted' : 'rejected');
  }

  // 수신자 결과 화면
  const emoji = document.getElementById('result-emoji');
  const title = document.getElementById('result-title');
  const sub   = document.getElementById('result-sub');
  const resetBtn = document.querySelector('.reset-btn');

  if (accepted) {
    emoji.textContent = '⚡🤝⚡';
    title.textContent = '번개 맞았다!';
    title.style.color = 'var(--yellow)';
    sub.textContent   = '만남이 성사됐어요! 곧 연락 오겠죠?';
    resetBtn.style.display = 'none';
  } else {
    emoji.textContent = '🛡';
    title.textContent = '피했다!';
    title.style.color = 'var(--muted)';
    sub.textContent   = '이번엔 못 만나네요. 다음 기회에!';
    resetBtn.style.display = 'none';
  }

  show('screen-result');
}

/* ─────────────────────────────────────────────
   STRIKER: 결과 수신
───────────────────────────────────────────── */
function showResult(accepted) {
  hide('screen-striker');
  flashLightning(accepted ? 8 : 1);

  const emoji = document.getElementById('result-emoji');
  const title = document.getElementById('result-title');
  const sub   = document.getElementById('result-sub');

  if (accepted) {
    emoji.textContent = '⚡💥⚡';
    title.textContent = '콰쾅!!!';
    title.style.color = 'var(--yellow)';
    sub.textContent   = '상대방이 번개를 맞았어요! 만남 성사!';
    // 진동
    if (navigator.vibrate) navigator.vibrate([100, 50, 100, 50, 300]);
  } else {
    emoji.textContent = '💨';
    title.textContent = '피해버렸다';
    title.style.color = 'var(--muted)';
    sub.textContent   = '이번엔 번개를 피했네요. 아쉽!';
    if (navigator.vibrate) navigator.vibrate(200);
  }

  show('screen-result');
}

function resetApp() {
  sessionId = null;
  document.getElementById('share-panel').classList.add('hidden');
  document.getElementById('share-url-display').textContent = '—';
  hide('screen-result');
  show('screen-striker');
}

/* ─────────────────────────────────────────────
   LIGHTNING ANIMATION
───────────────────────────────────────────── */
const canvas = document.getElementById('lightning-canvas');
const ctx = canvas.getContext('2d');
let animFrame = null;
let bolts = [];

function resizeCanvas() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

function flashLightning(count) {
  for (let i = 0; i < count; i++) {
    setTimeout(() => spawnBolt(), i * 120);
  }
}

function spawnBolt() {
  const startX = Math.random() * canvas.width;
  bolts.push({
    x: startX, y: 0,
    segments: generateBolt(startX, 0, canvas.height * (0.4 + Math.random() * 0.5)),
    alpha: 1, life: 1
  });
  if (!animFrame) renderLoop();
}

function generateBolt(sx, sy, len) {
  const segs = [];
  let x = sx, y = sy;
  const steps = Math.floor(len / 15);
  for (let i = 0; i < steps; i++) {
    const nx = x + (Math.random() - 0.5) * 60;
    const ny = y + len / steps;
    segs.push({ x1: x, y1: y, x2: nx, y2: ny });
    x = nx; y = ny;
  }
  return segs;
}

function renderLoop() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  bolts = bolts.filter(b => b.life > 0);

  bolts.forEach(b => {
    b.life -= 0.06;
    b.segments.forEach(s => {
      ctx.beginPath();
      ctx.moveTo(s.x1, s.y1);
      ctx.lineTo(s.x2, s.y2);
      ctx.strokeStyle = `rgba(255, 240, 80, ${b.life * 0.9})`;
      ctx.lineWidth = b.life * 3;
      ctx.shadowColor = '#ffe600';
      ctx.shadowBlur = 12;
      ctx.stroke();

      // 내부 흰 선
      ctx.beginPath();
      ctx.moveTo(s.x1, s.y1);
      ctx.lineTo(s.x2, s.y2);
      ctx.strokeStyle = `rgba(255,255,255,${b.life * 0.6})`;
      ctx.lineWidth = b.life;
      ctx.shadowBlur = 0;
      ctx.stroke();
    });
  });

  if (bolts.length > 0) {
    animFrame = requestAnimationFrame(renderLoop);
  } else {
    animFrame = null;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
  }
}

/* ─────────────────────────────────────────────
   HELPERS
───────────────────────────────────────────── */
function show(id) { document.getElementById(id).classList.remove('hidden'); }
function hide(id) { document.getElementById(id).classList.add('hidden'); }
</script>
